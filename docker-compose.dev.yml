version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: social-media-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: social_media_automation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: social-media-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: social-media-backend-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/social_media_automation
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRY: 7d
      FRONTEND_URL: http://localhost:3001
      # AWS S3 (optional for dev, will use local storage if not set)
      # AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      # AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      # AWS_REGION: ${AWS_REGION:-us-east-1}
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot reload
      - ./backend/src:/app/src:ro
      # Persistent uploads
      - uploads_dev:/app/uploads
      # Logs
      - ./backend/logs:/app/logs
    networks:
      - app-network
    command: npm run dev

  # Queue Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: social-media-worker-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/social_media_automation
      REDIS_URL: redis://redis:6379
      # AWS S3 (optional for dev)
      # AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      # AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      # AWS_REGION: ${AWS_REGION:-us-east-1}
    volumes:
      # Mount source code for hot reload
      - ./backend/src:/app/src:ro
      # Shared temp directory for video processing
      - temp_dev:/app/temp
      # Logs
      - ./backend/logs:/app/logs
    networks:
      - app-network
    command: npm run worker:dev

  # Frontend (placeholder - will be active when frontend is built)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: social-media-frontend-dev
  #   restart: unless-stopped
  #   depends_on:
  #     - backend
  #   environment:
  #     NODE_ENV: development
  #     NEXT_PUBLIC_API_URL: http://localhost:3000/api
  #   ports:
  #     - "3001:3001"
  #   volumes:
  #     - ./frontend/src:/app/src:ro
  #   networks:
  #     - app-network
  #   command: npm run dev

volumes:
  postgres_data_dev:
    driver: local
  redis_data_dev:
    driver: local
  uploads_dev:
    driver: local
  temp_dev:
    driver: local

networks:
  app-network:
    driver: bridge
